# =============================================================================
# Performance Engineering Platform — Configuration Commune
# =============================================================================
# Ce fichier contient les proprietes partagees par tous les profils.
# Les profils application-{local,orchestrator,agent}.yaml surchargent
# les proprietes specifiques au mode/role.
#
# CNF-03: Secrets via variables d'environnement — jamais en clair.
# ADR-006: Priorite env var > property (via RuntimeConfigEnvironmentPostProcessor).
# =============================================================================

spring:
  application.name: performance-platform

  # Profil actif par defaut — LOCAL (CNF-02: zero config externe)
  profiles.active: local

# ---- Health & Actuator (CD-02) ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      probes.enabled: true
      show-details: when-authorized
      show-components: when-authorized
  health:
    readinessstate.enabled: true
    livenessstate.enabled: true

# ---- IHM Web ----
# Desactivee par defaut. Surchargeable via WEB_UI_ENABLED=true
# (relaxed binding Spring Boot natif). En mode AGENT, force a false
# et le serveur web est desactive au niveau JVM (WebApplicationType.NONE — ADR-019).
web:
  ui:
    enabled: false

# ---- Securite ----
# Par defaut desactivee (mode LOCAL). Activee dans les profils
# orchestrator/agent avec le JWT resource server Spring Security.
platform:
  security:
    enabled: false

# ---- Transport ----
# InMemory par defaut (LOCAL). TransportConfiguration selectionne
# le bean selon transport.type (IN_MEMORY / KAFKA / RABBITMQ / HTTP / SOCKET).
transport:
  type: IN_MEMORY

# ---- Datasources ----
# Aucune datasource par defaut. Chaque profil definit
# ses propres datasources sous platform.datasources.*
# (ADR-014: DatasourceConfiguration + PlatformDatasourcesProperties).

# ---- Reporting ----
reporting:
  output-directory: ${REPORTING_OUTPUT_DIR:reports}
  formats:
    - HTML
    - PDF
    - JSON

# ---- Publishers ----
# Aucun publisher par defaut. Configurer dans les profils
# selon les besoins (Confluence, S3, Git...).

# ---- Logging ----
logging:
  level:
    root: INFO
    com.performance.platform: INFO
    # Reduit le bruit des bibliotheques au niveau WARN
    org.apache.kafka: WARN
    org.springframework.modulith: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
