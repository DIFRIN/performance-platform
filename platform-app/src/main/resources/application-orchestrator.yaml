# =============================================================================
# Performance Engineering Platform — Profil ORCHESTRATOR
# =============================================================================
# Active avec: spring.profiles.active=orchestrator
# ou via env var MODE=ORCHESTRATOR (ADR-006: env prioritaire).
#
# Mode DISTRIBUTED, role ORCHESTRATOR.
# Transport: typiquement KAFKA (configurable via TRANSPORT_TYPE env var).
# Securite: OAuth2/JWT activee (API REST securisee).
# =============================================================================

runtime:
  mode: DISTRIBUTED
  role: ORCHESTRATOR

# ---- Transport distribue ----
# Par defaut KAFKA. Surchargeable via TRANSPORT_TYPE env var
# (KAFKA / RABBITMQ / HTTP / SOCKET).
transport:
  type: KAFKA

  # ---- Transport Kafka specifics ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer-group: orchestrator
    tasks-topic: platform-tasks
    events-topic: platform-events
    signals-topic: platform-signals
    producer-acks: all

# ---- Infrastructure plateforme ----
platform:
  security:
    enabled: true

  # Named HTTP targets (PDR-022)
  # Chaque target definit son URL de base, timeouts, et mapping de chemins logiques.
  http-targets:
    wiremock:
      base-url: ${WIREMOCK_URL:http://wiremock:8080}
      connection-timeout: 2s
      read-timeout: 5s
      paths:
        reset-requests: /__admin/requests
        count-requests: /__admin/requests/count
        health: /__admin/health
    device-api:
      base-url: ${DEVICE_API_URL:http://device-api:8082}
      connection-timeout: 2s
      read-timeout: 10s
      paths:
        submit-event: /api/events
        check-device: /api/devices

  # Datasource PostgreSQL (production)
  # CNF-03: credentials via env vars.
  datasources:
    default:
      url: ${DB_URL:jdbc:postgresql://localhost:5432/performance}
      username: ${DB_USERNAME:postgres}
      password: ${DB_PASSWORD:changeme}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000


  # Named Kafka clusters (PDR-020)
  # Chaque cluster definit ses propres bootstrap-servers et topic mappings.
  # Les topic mappings traduisent un nom logique (utilise dans les scenarios)
  # vers un nom physique (topic Kafka reel).
  kafka-clusters:
    default:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      producer-acks: all
      consumer-group: perf-consumer
      topics: {}
    iot-sut:
      bootstrap-servers: ${IOT_KAFKA_SERVERS:localhost:9093}
      producer-acks: "1"
      consumer-group: perf-test-consumer
      topics:
        iot-commands: ${IOT_TOPIC_COMMANDS:iot-commands}
        device-events: ${DEVICE_TOPIC_EVENTS:device-events}

  # Publishers
  # Exemple: activer la publication Confluence
  # publishers:
  #   - target: CONFLUENCE
  #     properties:
  #       url: ${CONFLUENCE_URL}
  #       space-key: ${CONFLUENCE_SPACE_KEY}
  #       token: ${CONFLUENCE_TOKEN}

# ---- Securite OAuth2/JWT ----
# Configurer l'issuer URI via env var OAUTH2_ISSUER_URI.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:}

# ---- Reporting ----
reporting:
  output-directory: ${REPORTING_OUTPUT_DIR:/var/lib/performance-platform/reports}
  formats:
    - HTML
    - PDF
    - JSON

# ---- Observability ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes.enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.performance.platform: INFO
