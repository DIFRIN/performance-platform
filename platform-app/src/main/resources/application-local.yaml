# =============================================================================
# Performance Engineering Platform — Profil LOCAL
# =============================================================================
# Active avec: spring.profiles.active=local (defaut dans application.yaml)
# ou via --spring.profiles.active=local
#
# Mode LOCAL: tous les composants dans la meme JVM.
# Transport: IN_MEMORY uniquement.
# Securite: desactivee.
# Datasource: H2 en memoire pour le developpement.
# =============================================================================

runtime:
  mode: LOCAL

transport:
  type: IN_MEMORY

# ---- Securite desactivee en local ----
platform:
  security:
    enabled: false

  # Datasource H2 en memoire pour le dev local
  datasources:
    default:
      url: jdbc:h2:mem:performance-platform;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password: ""
      driver-class-name: org.h2.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 10000

  # Named HTTP targets for local development
  http-targets:
    wiremock:
      base-url: ${WIREMOCK_URL:http://localhost:8090}
      paths:
        reset-requests: /__admin/requests
        count-requests: /__admin/requests/count
    device-api:
      base-url: ${DEVICE_API_URL:http://localhost:8082}
      paths:
        submit-event: /api/events

# ---- Logging plus verbeux en local ----
logging:
  level:
    com.performance.platform: DEBUG
