# =============================================================================
# Performance Engineering Platform — Agent HorizontalPodAutoscaler
# =============================================================================
# Scales the agent Deployment based on CPU utilization.
# Min 2 replicas (baseline), max 20 replicas (burst).
# CPU target: 70% average utilization.
#
# Apply: kubectl apply -f agent-hpa.yaml
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: performance-agent-hpa
  labels:
    app: performance-agent
    component: agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: performance-agent
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
